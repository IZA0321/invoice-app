    <line x1="24" y1="44" x2="136" y2="44" stroke="#1e3a8a" stroke-width="6" stroke-linecap="round"/>
    <line x1="24" y1="80" x2="136" y2="80" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <line x1="24" y1="108" x2="136" y2="108" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <line x1="24" y1="136" x2="100" y2="136" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
